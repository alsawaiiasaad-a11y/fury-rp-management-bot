<!DOCTYPE html>
<html>
<head>
  <title>Fury Dashboard</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    table {
      margin: auto;
      border-collapse: collapse;
      width: 60%;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #333;
    }
  </style>
</head>
<body>

<h1>🔥 Fury Leaderboard</h1>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>User ID</th>
      <th>Points</th>
    </tr>
  </thead>
  <tbody id="board"></tbody>
</table>

<script>
async function loadLeaderboard() {
  const res = await fetch('/leaderboard');
  const data = await res.json();

  const board = document.getElementById('board');
  board.innerHTML = '';

  data.forEach((user, index) => {
    board.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${user.userId}</td>
        <td>${user.total}</td>
      </tr>
    `;
  });
}

loadLeaderboard();
setInterval(loadLeaderboard, 5000);
</script>

</body>
</html>
